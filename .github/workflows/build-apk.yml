name: Build APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter info
        run: |
          flutter --version
          flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=APIFY_TOKEN=${{ secrets.APIFY_TOKEN || 'APIFY_TOKEN_NOT_SET' }}

      - name: List build outputs
        run: |
          ls -la build/app/outputs/flutter-apk/ || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: vauge-report-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
