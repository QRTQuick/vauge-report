name: Build APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter info
        run: |
          flutter --version
          flutter pub get

      - name: Clean previous builds
        run: flutter clean

      - name: Regenerate Android app
        run: |
          rm -rf android/
          flutter create . --platforms android --org com.vauge.report --project-name vauge_report

      - name: Enable core library desugaring
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          gradle_groovy = Path("android/app/build.gradle")
          gradle_kts = Path("android/app/build.gradle.kts")
          if gradle_groovy.exists():
              path = gradle_groovy
              is_kts = False
          elif gradle_kts.exists():
              path = gradle_kts
              is_kts = True
          else:
              raise FileNotFoundError("android/app/build.gradle(.kts) not found")

          text = path.read_text()
          original = text

          def add_compile_options_groovy(t: str) -> str:
              if "coreLibraryDesugaringEnabled" in t:
                  return t
              m = re.search(r"compileOptions\s*\{\s*", t)
              if m:
                  line_start = t.rfind("\n", 0, m.start()) + 1
                  indent = re.match(r"\s*", t[line_start:m.start()]).group(0)
                  inner_indent = indent + "    "
                  insertion = f"\n{inner_indent}coreLibraryDesugaringEnabled true\n"
                  return t[:m.end()] + insertion + t[m.end():]
              m = re.search(r"android\s*\{\s*", t)
              if m:
                  line_start = t.rfind("\n", 0, m.start()) + 1
                  indent = re.match(r"\s*", t[line_start:m.start()]).group(0)
                  inner_indent = indent + "    "
                  block = (
                      f"\n{inner_indent}compileOptions {{\n"
                      f"{inner_indent}    sourceCompatibility JavaVersion.VERSION_1_8\n"
                      f"{inner_indent}    targetCompatibility JavaVersion.VERSION_1_8\n"
                      f"{inner_indent}    coreLibraryDesugaringEnabled true\n"
                      f"{inner_indent}}}\n"
                  )
                  return t[:m.end()] + block + t[m.end():]
              return t

          def add_compile_options_kts(t: str) -> str:
              if "coreLibraryDesugaringEnabled" in t:
                  return t
              m = re.search(r"compileOptions\s*\{\s*", t)
              if m:
                  line_start = t.rfind("\n", 0, m.start()) + 1
                  indent = re.match(r"\s*", t[line_start:m.start()]).group(0)
                  inner_indent = indent + "    "
                  insertion = f"\n{inner_indent}isCoreLibraryDesugaringEnabled = true\n"
                  return t[:m.end()] + insertion + t[m.end():]
              m = re.search(r"android\s*\{\s*", t)
              if m:
                  line_start = t.rfind("\n", 0, m.start()) + 1
                  indent = re.match(r"\s*", t[line_start:m.start()]).group(0)
                  inner_indent = indent + "    "
                  block = (
                      f"\n{inner_indent}compileOptions {{\n"
                      f"{inner_indent}    sourceCompatibility = JavaVersion.VERSION_1_8\n"
                      f"{inner_indent}    targetCompatibility = JavaVersion.VERSION_1_8\n"
                      f"{inner_indent}    isCoreLibraryDesugaringEnabled = true\n"
                      f"{inner_indent}}}\n"
                  )
                  return t[:m.end()] + block + t[m.end():]
              return t

          def add_dependency_groovy(t: str) -> str:
              if "coreLibraryDesugaring" in t:
                  return t
              m = re.search(r"dependencies\s*\{\s*", t)
              if m:
                  line_start = t.rfind("\n", 0, m.start()) + 1
                  indent = re.match(r"\s*", t[line_start:m.start()]).group(0)
                  inner_indent = indent + "    "
                  insertion = (
                      f"\n{inner_indent}coreLibraryDesugaring "
                      f"'com.android.tools:desugar_jdk_libs:2.0.4'\n"
                  )
                  return t[:m.end()] + insertion + t[m.end():]
              return t

          def add_dependency_kts(t: str) -> str:
              if "coreLibraryDesugaring" in t:
                  return t
              m = re.search(r"dependencies\s*\{\s*", t)
              if m:
                  line_start = t.rfind("\n", 0, m.start()) + 1
                  indent = re.match(r"\s*", t[line_start:m.start()]).group(0)
                  inner_indent = indent + "    "
                  insertion = (
                      f"\n{inner_indent}coreLibraryDesugaring("
                      f"\"com.android.tools:desugar_jdk_libs:2.0.4\")\n"
                  )
                  return t[:m.end()] + insertion + t[m.end():]
              return t

          if is_kts:
              text = add_compile_options_kts(text)
              text = add_dependency_kts(text)
          else:
              text = add_compile_options_groovy(text)
              text = add_dependency_groovy(text)

          if text != original:
              path.write_text(text)
              print(f"Updated {path} for core library desugaring.")
          else:
              print(f"No changes needed for {path}.")
          PY

      - name: Get dependencies after regeneration
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=APIFY_TOKEN=${{ secrets.APIFY_TOKEN || 'APIFY_TOKEN_NOT_SET' }}

      - name: List build outputs
        run: |
          ls -la build/app/outputs/flutter-apk/ || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: vauge-report-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
